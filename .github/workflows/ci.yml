name: AlgoViz CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Compile TypeScript Extension
  # ─────────────────────────────────────────────
  extension-build:
    name: 🔧 Build VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint
        continue-on-error: true

      - name: Compile extension
        run: npm run compile

      - name: Upload compiled output
        uses: actions/upload-artifact@v4
        with:
          name: compiled-extension
          path: out/

  # ─────────────────────────────────────────────
  # Job 2: Python Layer Tests
  # ─────────────────────────────────────────────
  python-tests:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f python/requirements.txt ]; then pip install -r python/requirements.txt; fi

      - name: Run Python tests
        run: |
          pytest python/tests/ -v --cov=python --cov-report=xml
        continue-on-error: true

      - name: Validate viz.py instrumentation output
        run: |
          cd python
          python bubble_sort.py
          python -c "
          import json
          with open('steps.json') as f:
              steps = json.load(f)
          assert isinstance(steps, list), 'steps.json must be a list'
          assert len(steps) > 0, 'steps.json must not be empty'
          print(f'✅ steps.json OK — {len(steps)} steps recorded')
          "

      - name: Validate benchmark output
        run: |
          cd python
          python benchmark.py
          python -c "
          import json
          with open('performance.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'performance.json must be a list'
          assert all('n' in d and 'time' in d for d in data), 'Each entry must have n and time'
          print(f'✅ performance.json OK — {len(data)} data points')
          "

  # ─────────────────────────────────────────────
  # Job 3: WebView / Frontend Lint
  # ─────────────────────────────────────────────
  webview-lint:
    name: 🌐 WebView Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check webview HTML is well-formed
        run: |
          if [ -f webview/index.html ]; then
            echo "✅ webview/index.html exists"
          else
            echo "❌ webview/index.html missing"
            exit 1
          fi

      - name: Check JS files exist
        run: |
          for file in animator.js graph.js complexity.js; do
            if [ -f "webview/$file" ]; then
              echo "✅ webview/$file found"
            else
              echo "⚠️  webview/$file not found (may not be created yet)"
            fi
          done

  # ─────────────────────────────────────────────
  # Job 4: Package Extension (on push to main only)
  # ─────────────────────────────────────────────
  package:
    name: 📦 Package Extension
    runs-on: ubuntu-latest
    needs: [extension-build, python-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Compile extension
        run: npm run compile

      - name: Package .vsix
        run: vsce package --no-dependencies
        continue-on-error: true

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: algoviz-vsix
          path: '*.vsix'
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 5: Dependency Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true